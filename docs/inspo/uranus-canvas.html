<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; display: flex; align-items: center; justify-content: center; height: 100vh; }
  canvas { border: 1px solid rgba(100,200,220,0.15); border-radius: 4px; }
</style>
</head>
<body>
<canvas id="c" width="800" height="500"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 500;

// Uranus — large, left side, the planet we're skimming
const URANUS_X = -60;
const URANUS_Y = H * 0.35;
const URANUS_R = 280;

// Sun — tiny distant point, upper right
const SUN_X = W * 0.9;
const SUN_Y = H * 0.08;
const SUN_R = 4;

// Cook zone — atmosphere threshold
const COOK_ZONE_Y = H * 0.78;

// Starfield — deep space, many visible stars this far out
const stars = [];
for (let i = 0; i < 220; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.1 + 0.2,
    brightness: Math.random() * 0.55 + 0.2,
    twinkleSpeed: Math.random() * 1.5 + 0.5,
    twinkleOffset: Math.random() * Math.PI * 2,
    hue: Math.random(), // 0 = cool blue, 1 = warm
  });
}

// Kuiper belt — distant icy debris field across the background
const kuiperParticles = [];
for (let i = 0; i < 120; i++) {
  kuiperParticles.push({
    x: W * 0.3 + Math.random() * W * 0.75,
    y: H * 0.15 + Math.random() * H * 0.5,
    size: 0.5 + Math.random() * 2,
    brightness: 0.08 + Math.random() * 0.15,
    drift: 0.5 + Math.random() * 2,
    twinkle: Math.random() * Math.PI * 2,
  });
}

// Thin ring system — Uranus has faint dark rings
const ringParticles = [];
for (let i = 0; i < 180; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = URANUS_R + 20 + Math.random() * 80;
  // Uranus is tilted ~98 degrees — rings appear nearly vertical
  ringParticles.push({
    angle,
    dist,
    size: 0.5 + Math.random() * 1.5,
    brightness: 0.1 + Math.random() * 0.15,
    speed: (0.01 + Math.random() * 0.015) / (dist * 0.003),
  });
}

// Ice crystal particles drifting near the atmosphere
const iceCrystals = [];
for (let i = 0; i < 50; i++) {
  iceCrystals.push({
    x: Math.random() * W * 1.3,
    y: H * 0.3 + Math.random() * H * 0.45,
    size: 1 + Math.random() * 2.5,
    speed: 3 + Math.random() * 12,
    alpha: 0.05 + Math.random() * 0.1,
    drift: (Math.random() - 0.5) * 4,
    sparkle: Math.random() * Math.PI * 2,
    sparkleSpeed: 2 + Math.random() * 4,
  });
}

// Gas puffs — methane-tinted, cyan/teal
const puffDemo = [];
for (let i = 0; i < 7; i++) {
  puffDemo.push({
    x: 60 + Math.random() * (W - 120),
    y: COOK_ZONE_Y + Math.random() * 25,
    r: 10 + Math.random() * 16,
    speed: 15 + Math.random() * 14,
    alpha: 0.4 + Math.random() * 0.3,
  });
}

let time = 0;

function drawBackground() {
  // Deep cold space — very dark blue-black with subtle teal tint near planet
  const bg = ctx.createRadialGradient(URANUS_X + 150, URANUS_Y, 100, W * 0.5, H * 0.5, W);
  bg.addColorStop(0, '#0a1218');
  bg.addColorStop(0.2, '#080e14');
  bg.addColorStop(0.5, '#060a10');
  bg.addColorStop(1, '#04060a');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
}

function drawKuiperBelt(t) {
  // Distant band of icy debris — subtle, far away
  ctx.save();

  // Faint diffuse glow across the belt region
  const beltGlow = ctx.createLinearGradient(W * 0.35, H * 0.2, W, H * 0.45);
  beltGlow.addColorStop(0, 'rgba(80,100,130,0)');
  beltGlow.addColorStop(0.3, 'rgba(80,100,130,0.008)');
  beltGlow.addColorStop(0.5, 'rgba(90,110,140,0.012)');
  beltGlow.addColorStop(0.7, 'rgba(80,100,130,0.008)');
  beltGlow.addColorStop(1, 'rgba(80,100,130,0)');
  ctx.fillStyle = beltGlow;
  ctx.fillRect(W * 0.3, H * 0.1, W * 0.75, H * 0.55);

  for (const k of kuiperParticles) {
    k.x -= k.drift * 0.016;
    if (k.x < W * 0.25) k.x = W * 1.05 + Math.random() * 30;

    const sparkle = Math.sin(t * 1.5 + k.twinkle) * 0.3 + 0.7;
    const alpha = k.brightness * sparkle;

    // Icy blue-white color
    ctx.beginPath();
    ctx.arc(k.x, k.y, k.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,200,220,${alpha})`;
    ctx.fill();

    // Subtle glint on larger particles
    if (k.size > 1.2 && sparkle > 0.85) {
      ctx.beginPath();
      ctx.arc(k.x, k.y, k.size * 1.8, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,220,240,${alpha * 0.15})`;
      ctx.fill();
    }
  }
  ctx.restore();
}

function drawStars(t) {
  for (const s of stars) {
    // Skip stars behind Uranus
    const dx = s.x - URANUS_X;
    const dy = s.y - URANUS_Y;
    if (dx * dx + dy * dy < (URANUS_R + 10) * (URANUS_R + 10)) continue;

    const twinkle = Math.sin(t * s.twinkleSpeed + s.twinkleOffset) * 0.3 + 0.7;
    const alpha = s.brightness * twinkle;
    if (alpha < 0.02) continue;

    // Color variation — mostly cool but some warm
    const r = s.hue > 0.8 ? 240 : s.hue > 0.6 ? 220 : 200;
    const g = s.hue > 0.8 ? 210 : 215;
    const b = s.hue > 0.5 ? 220 : 240;

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.fill();
  }
}

function drawSun(t) {
  // Tiny distant sun — barely a bright star
  ctx.save();

  // Modest glow
  const glow = ctx.createRadialGradient(SUN_X, SUN_Y, 0, SUN_X, SUN_Y, 35);
  glow.addColorStop(0, 'rgba(255,250,235,0.4)');
  glow.addColorStop(0.15, 'rgba(255,240,200,0.1)');
  glow.addColorStop(0.4, 'rgba(255,220,170,0.02)');
  glow.addColorStop(1, 'rgba(255,200,140,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(SUN_X, SUN_Y, 35, 0, Math.PI * 2);
  ctx.fill();

  // Tiny disc
  ctx.beginPath();
  ctx.arc(SUN_X, SUN_Y, SUN_R, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,250,235,0.9)';
  ctx.fill();

  ctx.restore();
}

function drawUranusRingsBack(t) {
  // Faint dark rings behind the planet — Uranus rings are nearly vertical due to axial tilt
  ctx.save();
  for (const p of ringParticles) {
    const a = p.angle + t * p.speed;
    // Nearly vertical ring plane (tilted ~82 degrees from horizontal view)
    const px = URANUS_X + Math.cos(a) * p.dist * 0.15; // very narrow horizontal spread
    const py = URANUS_Y + Math.sin(a) * p.dist;

    // Only behind planet
    if (Math.cos(a) > 0.1) continue;

    const dx = px - URANUS_X;
    const dy = py - URANUS_Y;
    if (dx * dx + dy * dy < URANUS_R * URANUS_R) continue;
    if (px < -20 || px > W + 20 || py < -20 || py > H + 20) continue;

    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(120,140,160,${p.brightness * 0.6})`;
    ctx.fill();
  }
  ctx.restore();
}

function drawUranus(t) {
  ctx.save();

  // Planet body — featureless teal-cyan ice giant
  ctx.beginPath();
  ctx.arc(URANUS_X, URANUS_Y, URANUS_R, 0, Math.PI * 2);
  ctx.clip();

  // Base gradient — uniform teal with very subtle banding
  const pg = ctx.createRadialGradient(
    URANUS_X + URANUS_R * 0.3, URANUS_Y - URANUS_R * 0.2, URANUS_R * 0.1,
    URANUS_X, URANUS_Y, URANUS_R
  );
  pg.addColorStop(0, '#8ed4cc');
  pg.addColorStop(0.3, '#6dbfb8');
  pg.addColorStop(0.5, '#5aada8');
  pg.addColorStop(0.7, '#4a9a98');
  pg.addColorStop(0.9, '#3a8888');
  pg.addColorStop(1, '#2a6e70');
  ctx.fillStyle = pg;
  ctx.fillRect(URANUS_X - URANUS_R, URANUS_Y - URANUS_R, URANUS_R * 2, URANUS_R * 2);

  // Very subtle horizontal bands — Uranus is famously featureless
  for (let i = 0; i < 8; i++) {
    const bandY = URANUS_Y - URANUS_R + (URANUS_R * 2 / 8) * i;
    const bandH = URANUS_R * 2 / 8;
    const alpha = 0.015 + Math.sin(i * 2.1 + t * 0.1) * 0.005;
    ctx.fillStyle = i % 2 === 0 ? `rgba(100,180,175,${alpha})` : `rgba(60,140,140,${alpha})`;
    ctx.fillRect(URANUS_X - URANUS_R, bandY, URANUS_R * 2, bandH);
  }

  // Limb darkening
  const limb = ctx.createRadialGradient(
    URANUS_X + URANUS_R * 0.2, URANUS_Y - URANUS_R * 0.15, URANUS_R * 0.3,
    URANUS_X, URANUS_Y, URANUS_R
  );
  limb.addColorStop(0, 'rgba(0,0,0,0)');
  limb.addColorStop(0.6, 'rgba(0,0,0,0.1)');
  limb.addColorStop(0.85, 'rgba(0,0,0,0.3)');
  limb.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = limb;
  ctx.fillRect(URANUS_X - URANUS_R, URANUS_Y - URANUS_R, URANUS_R * 2, URANUS_R * 2);

  ctx.restore();

  // Atmospheric glow — cold teal
  const glow = ctx.createRadialGradient(URANUS_X, URANUS_Y, URANUS_R - 5, URANUS_X, URANUS_Y, URANUS_R + 30);
  glow.addColorStop(0, 'rgba(100,200,195,0)');
  glow.addColorStop(0.4, 'rgba(100,200,195,0.04)');
  glow.addColorStop(0.7, 'rgba(80,180,175,0.02)');
  glow.addColorStop(1, 'rgba(60,160,155,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(URANUS_X, URANUS_Y, URANUS_R + 30, 0, Math.PI * 2);
  ctx.fill();
}

function drawUranusRingsFront(t) {
  ctx.save();
  for (const p of ringParticles) {
    const a = p.angle + t * p.speed;
    const px = URANUS_X + Math.cos(a) * p.dist * 0.15;
    const py = URANUS_Y + Math.sin(a) * p.dist;

    if (Math.cos(a) <= 0.1) continue;
    if (px < -20 || px > W + 20 || py < -20 || py > H + 20) continue;

    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(120,140,160,${p.brightness * 0.5})`;
    ctx.fill();
  }
  ctx.restore();
}

function drawIceCrystals(t) {
  ctx.save();
  for (const ic of iceCrystals) {
    ic.x -= ic.speed * 0.016;
    ic.y += ic.drift * 0.016;
    if (ic.x < -15) {
      ic.x = W + 10 + Math.random() * 30;
      ic.y = H * 0.3 + Math.random() * H * 0.45;
    }

    const sparkle = Math.sin(t * ic.sparkleSpeed + ic.sparkle);
    const alpha = ic.alpha + (sparkle > 0.7 ? 0.08 : 0);

    ctx.beginPath();
    ctx.arc(ic.x, ic.y, ic.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(160,210,220,${alpha})`;
    ctx.fill();

    // Sparkle flash
    if (sparkle > 0.9) {
      ctx.beginPath();
      // Tiny cross sparkle
      ctx.moveTo(ic.x - ic.size * 2, ic.y);
      ctx.lineTo(ic.x + ic.size * 2, ic.y);
      ctx.moveTo(ic.x, ic.y - ic.size * 2);
      ctx.lineTo(ic.x, ic.y + ic.size * 2);
      ctx.strokeStyle = `rgba(200,235,240,${alpha * 0.6})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawAtmosphereLayer() {
  // Methane atmosphere glow near the cook zone — teal haze
  const haze = ctx.createLinearGradient(0, COOK_ZONE_Y - 60, 0, H);
  haze.addColorStop(0, 'rgba(60,180,170,0)');
  haze.addColorStop(0.15, 'rgba(60,170,160,0.02)');
  haze.addColorStop(0.4, 'rgba(50,160,150,0.05)');
  haze.addColorStop(0.7, 'rgba(40,140,135,0.1)');
  haze.addColorStop(1, 'rgba(30,120,115,0.2)');
  ctx.fillStyle = haze;
  ctx.fillRect(0, COOK_ZONE_Y - 60, W, H - COOK_ZONE_Y + 60);

  // Dense methane cloud layer at the bottom
  const cloudGrad = ctx.createLinearGradient(0, H * 0.85, 0, H);
  cloudGrad.addColorStop(0, 'rgba(50,150,145,0.08)');
  cloudGrad.addColorStop(0.5, 'rgba(40,130,125,0.15)');
  cloudGrad.addColorStop(1, 'rgba(30,110,105,0.25)');
  ctx.fillStyle = cloudGrad;
  ctx.fillRect(0, H * 0.85, W, H * 0.15);
}

function drawCookZone(t) {
  ctx.save();

  // Dashed line — cool cyan
  const linePulse = Math.sin(t * 2) * 0.08 + 0.28;
  ctx.setLineDash([8, 6]);
  ctx.strokeStyle = `rgba(80,200,190,${linePulse})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, COOK_ZONE_Y);
  ctx.lineTo(W, COOK_ZONE_Y);
  ctx.stroke();

  ctx.restore();
}

function drawGasPuffs(t) {
  for (const p of puffDemo) {
    p.y -= p.speed * 0.016;
    if (p.y < COOK_ZONE_Y * 0.25) {
      p.y = COOK_ZONE_Y + 8 + Math.random() * 20;
      p.x = 60 + Math.random() * (W - 120);
    }
    const fadeRatio = (COOK_ZONE_Y - p.y) / (COOK_ZONE_Y * 0.5);
    const alpha = Math.max(0, p.alpha * (1 - fadeRatio));
    if (alpha <= 0) continue;

    // Methane gas — cyan/teal glow
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
    grad.addColorStop(0, `rgba(100,220,210,${alpha * 0.85})`);
    grad.addColorStop(0.35, `rgba(70,190,180,${alpha * 0.5})`);
    grad.addColorStop(0.7, `rgba(50,160,150,${alpha * 0.2})`);
    grad.addColorStop(1, 'rgba(30,130,120,0)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }
}

function drawColdOverlay(t) {
  // Very subtle cold wash — this place is freezing
  const pulse = Math.sin(t * 0.3) * 0.003 + 0.008;
  ctx.fillStyle = `rgba(60,140,150,${pulse})`;
  ctx.fillRect(0, 0, W, H);
}

function drawVignette() {
  const vg = ctx.createRadialGradient(W * 0.45, H * 0.45, W * 0.2, W * 0.5, H * 0.5, W * 0.72);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(0.6, 'rgba(0,0,0,0.12)');
  vg.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

function render() {
  time += 0.016;
  ctx.clearRect(0, 0, W, H);

  drawBackground();
  drawKuiperBelt(time);
  drawStars(time);
  drawSun(time);
  drawUranusRingsBack(time);
  drawUranus(time);
  drawUranusRingsFront(time);
  drawIceCrystals(time);
  drawAtmosphereLayer();
  drawCookZone(time);
  drawGasPuffs(time);
  drawColdOverlay(time);
  drawVignette();

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
