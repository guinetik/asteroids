<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; display: flex; align-items: center; justify-content: center; height: 100vh; }
  canvas { border: 1px solid rgba(100,200,220,0.15); border-radius: 4px; }
</style>
</head>
<body>
<canvas id="c" width="800" height="500"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 500;

// Earth — large, right side, partially off-screen
const EARTH_X = W + 80;
const EARTH_Y = H * 0.5;
const EARTH_R = 320;

// Starfield
const stars = [];
for (let i = 0; i < 180; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.0 + 0.2,
    brightness: Math.random() * 0.4 + 0.15,
    twinkleSpeed: Math.random() * 2 + 0.5,
    twinkleOffset: Math.random() * Math.PI * 2,
  });
}

// Orbital lane markers — dashed lines scrolling down
const LANE_COUNT = 5;
const LANE_SPACING = W * 0.75 / (LANE_COUNT + 1);
const LANE_START_X = W * 0.08;

// Traffic shuttles scrolling down at various speeds
const traffic = [];
for (let i = 0; i < 8; i++) {
  const lane = Math.floor(Math.random() * LANE_COUNT);
  traffic.push({
    x: LANE_START_X + LANE_SPACING * (lane + 1),
    y: -40 - Math.random() * H * 2,
    speed: 60 + Math.random() * 100,
    size: 6 + Math.random() * 8,
    lane,
    alpha: 0.3 + Math.random() * 0.3,
    variation: Math.random(), // body shape variation
  });
}

// Route symbols scrolling down
const SYMBOL_TYPES = ['star', 'diamond', 'circle', 'triangle', 'square'];
const routeSymbols = [];
for (let i = 0; i < 12; i++) {
  const lane = Math.floor(Math.random() * LANE_COUNT);
  routeSymbols.push({
    x: LANE_START_X + LANE_SPACING * (lane + 1),
    y: -60 - i * 120 - Math.random() * 40,
    type: SYMBOL_TYPES[Math.floor(Math.random() * SYMBOL_TYPES.length)],
    lane,
    collected: false,
    pulse: Math.random() * Math.PI * 2,
  });
}

// Player shuttle
const player = {
  x: LANE_START_X + LANE_SPACING * 3,
  y: H * 0.7,
  targetX: LANE_START_X + LANE_SPACING * 3,
  centerX: LANE_START_X + LANE_SPACING * 3,
  bob: 0,
};

// Orbital debris / small particles scrolling down (speed reference)
const scrollParticles = [];
for (let i = 0; i < 40; i++) {
  scrollParticles.push({
    x: Math.random() * W * 0.8,
    y: Math.random() * H,
    size: 0.5 + Math.random() * 1.5,
    speed: 30 + Math.random() * 60,
    alpha: 0.04 + Math.random() * 0.06,
  });
}

// Space station silhouettes in the distance (parallax)
const stations = [
  { x: W * 0.15, y: H * 0.15, size: 12, speed: 8, alpha: 0.08 },
  { x: W * 0.65, y: H * 0.35, size: 8, speed: 5, alpha: 0.05 },
  { x: W * 0.4, y: H * 0.8, size: 15, speed: 12, alpha: 0.06 },
];

let time = 0;
let scrollOffset = 0;
const SCROLL_SPEED = 80;

// Input
const keys = {};
document.addEventListener('keydown', (e) => { keys[e.key] = true; });
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

function drawBackground() {
  const bg = ctx.createLinearGradient(0, 0, W, 0);
  bg.addColorStop(0, '#060810');
  bg.addColorStop(0.6, '#080a14');
  bg.addColorStop(0.8, '#0c1020');
  bg.addColorStop(1, '#101828');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
}

function drawEarth(t) {
  ctx.save();

  // Atmosphere glow
  const atmoGlow = ctx.createRadialGradient(EARTH_X, EARTH_Y, EARTH_R - 20, EARTH_X, EARTH_Y, EARTH_R + 60);
  atmoGlow.addColorStop(0, 'rgba(60,140,220,0)');
  atmoGlow.addColorStop(0.5, 'rgba(60,140,220,0.06)');
  atmoGlow.addColorStop(0.7, 'rgba(80,160,240,0.03)');
  atmoGlow.addColorStop(1, 'rgba(60,120,200,0)');
  ctx.fillStyle = atmoGlow;
  ctx.beginPath();
  ctx.arc(EARTH_X, EARTH_Y, EARTH_R + 60, 0, Math.PI * 2);
  ctx.fill();

  // Planet body
  ctx.beginPath();
  ctx.arc(EARTH_X, EARTH_Y, EARTH_R, 0, Math.PI * 2);
  ctx.clip();

  // Base ocean blue
  const pg = ctx.createRadialGradient(
    EARTH_X - EARTH_R * 0.3, EARTH_Y - EARTH_R * 0.2, EARTH_R * 0.1,
    EARTH_X, EARTH_Y, EARTH_R
  );
  pg.addColorStop(0, '#4a90d0');
  pg.addColorStop(0.3, '#3a78b8');
  pg.addColorStop(0.5, '#2a60a0');
  pg.addColorStop(0.7, '#1e4a88');
  pg.addColorStop(1, '#103060');
  ctx.fillStyle = pg;
  ctx.fillRect(EARTH_X - EARTH_R, EARTH_Y - EARTH_R, EARTH_R * 2, EARTH_R * 2);

  // Continent blobs — green/brown patches
  const continents = [
    { x: EARTH_X - 180, y: EARTH_Y - 80, rx: 60, ry: 45 },
    { x: EARTH_X - 220, y: EARTH_Y + 40, rx: 40, ry: 30 },
    { x: EARTH_X - 140, y: EARTH_Y + 100, rx: 35, ry: 50 },
    { x: EARTH_X - 100, y: EARTH_Y - 140, rx: 50, ry: 25 },
    { x: EARTH_X - 250, y: EARTH_Y - 20, rx: 30, ry: 40 },
  ];
  for (const c of continents) {
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.rx, c.ry, 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(50,95,45,0.4)';
    ctx.fill();
    // Desert/brown inland
    ctx.beginPath();
    ctx.ellipse(c.x + 5, c.y + 3, c.rx * 0.5, c.ry * 0.4, 0.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(120,100,60,0.15)';
    ctx.fill();
  }

  // Cloud swirls
  for (let i = 0; i < 6; i++) {
    const cx = EARTH_X - 280 + i * 55 + Math.sin(t * 0.1 + i) * 10;
    const cy = EARTH_Y - 120 + i * 50 + Math.cos(t * 0.08 + i * 2) * 8;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 40 + i * 5, 12 + i * 2, 0.3 + i * 0.1, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(220,230,240,0.08)';
    ctx.fill();
  }

  // Limb darkening
  const limb = ctx.createRadialGradient(
    EARTH_X - EARTH_R * 0.25, EARTH_Y - EARTH_R * 0.15, EARTH_R * 0.3,
    EARTH_X, EARTH_Y, EARTH_R
  );
  limb.addColorStop(0, 'rgba(0,0,0,0)');
  limb.addColorStop(0.6, 'rgba(0,0,0,0.1)');
  limb.addColorStop(0.85, 'rgba(0,0,0,0.35)');
  limb.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = limb;
  ctx.fillRect(EARTH_X - EARTH_R, EARTH_Y - EARTH_R, EARTH_R * 2, EARTH_R * 2);

  // City lights on the dark side (right edge, facing us)
  for (let i = 0; i < 15; i++) {
    const lx = EARTH_X - 80 - Math.random() * 200;
    const ly = EARTH_Y - 150 + Math.random() * 300;
    const dx = lx - EARTH_X;
    const dy = ly - EARTH_Y;
    if (dx * dx + dy * dy > EARTH_R * EARTH_R) continue;
    // Only on dark side
    const darkSide = (lx - EARTH_X + EARTH_R * 0.3) / EARTH_R;
    if (darkSide < 0.3) continue;
    ctx.beginPath();
    ctx.arc(lx, ly, 1 + Math.random() * 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,220,140,${0.05 + Math.random() * 0.08})`;
    ctx.fill();
  }

  ctx.restore();

  // Thin blue atmosphere line on the lit edge
  ctx.save();
  ctx.beginPath();
  ctx.arc(EARTH_X, EARTH_Y, EARTH_R + 2, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(80,160,255,0.08)';
  ctx.lineWidth = 4;
  ctx.stroke();
  ctx.restore();
}

function drawStars(t) {
  for (const s of stars) {
    const dx = s.x - EARTH_X;
    const dy = s.y - EARTH_Y;
    if (dx * dx + dy * dy < (EARTH_R + 10) * (EARTH_R + 10)) continue;

    const twinkle = Math.sin(t * s.twinkleSpeed + s.twinkleOffset) * 0.3 + 0.7;
    const alpha = s.brightness * twinkle;
    if (alpha < 0.02) continue;

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(210,215,235,${alpha})`;
    ctx.fill();
  }
}

function drawLaneMarkers(t) {
  // Dashed lane dividers scrolling down — orbital shipping lanes
  ctx.save();
  ctx.setLineDash([12, 20]);
  const dashOffset = -(scrollOffset % 32);
  ctx.lineDashOffset = dashOffset;

  for (let i = 0; i <= LANE_COUNT; i++) {
    const x = LANE_START_X + LANE_SPACING * (i + 0.5);
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.strokeStyle = 'rgba(60,100,140,0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Outer lane boundaries — slightly brighter
  ctx.setLineDash([20, 10]);
  ctx.lineDashOffset = dashOffset;
  const leftBound = LANE_START_X + LANE_SPACING * 0.5;
  const rightBound = LANE_START_X + LANE_SPACING * (LANE_COUNT + 0.5);

  ctx.beginPath();
  ctx.moveTo(leftBound, 0);
  ctx.lineTo(leftBound, H);
  ctx.strokeStyle = 'rgba(60,120,160,0.12)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(rightBound, 0);
  ctx.lineTo(rightBound, H);
  ctx.strokeStyle = 'rgba(60,120,160,0.12)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.setLineDash([]);
  ctx.restore();
}

function drawScrollParticles() {
  for (const p of scrollParticles) {
    p.y += p.speed * 0.016;
    if (p.y > H + 10) {
      p.y = -5;
      p.x = Math.random() * W * 0.8;
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(120,150,180,${p.alpha})`;
    ctx.fill();
  }
}

function drawSymbol(x, y, type, size, alpha, t) {
  ctx.save();
  ctx.translate(x, y);

  // Glow
  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 2);
  glow.addColorStop(0, `rgba(80,220,200,${alpha * 0.3})`);
  glow.addColorStop(1, 'rgba(80,220,200,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, size * 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = `rgba(80,220,200,${alpha})`;
  ctx.fillStyle = `rgba(80,220,200,${alpha * 0.2})`;
  ctx.lineWidth = 1.5;

  switch (type) {
    case 'star': {
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i * Math.PI * 2 / 5) - Math.PI / 2;
        const aInner = a + Math.PI / 5;
        const ox = Math.cos(a) * size;
        const oy = Math.sin(a) * size;
        const ix = Math.cos(aInner) * size * 0.4;
        const iy = Math.sin(aInner) * size * 0.4;
        if (i === 0) ctx.moveTo(ox, oy);
        else ctx.lineTo(ox, oy);
        ctx.lineTo(ix, iy);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      break;
    }
    case 'diamond': {
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(size * 0.7, 0);
      ctx.lineTo(0, size);
      ctx.lineTo(-size * 0.7, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      break;
    }
    case 'circle': {
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.8, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      break;
    }
    case 'triangle': {
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(size * 0.85, size * 0.7);
      ctx.lineTo(-size * 0.85, size * 0.7);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      break;
    }
    case 'square': {
      const s = size * 0.75;
      ctx.beginPath();
      ctx.rect(-s, -s, s * 2, s * 2);
      ctx.fill();
      ctx.stroke();
      break;
    }
  }
  ctx.restore();
}

function drawRouteSymbols(t) {
  for (const sym of routeSymbols) {
    sym.y += SCROLL_SPEED * 0.016;
    if (sym.y > H + 40) {
      sym.y = -40 - Math.random() * 60;
      sym.lane = Math.floor(Math.random() * LANE_COUNT);
      sym.x = LANE_START_X + LANE_SPACING * (sym.lane + 1);
      sym.type = SYMBOL_TYPES[Math.floor(Math.random() * SYMBOL_TYPES.length)];
      sym.collected = false;
    }

    if (sym.collected) continue;

    const pulse = Math.sin(t * 3 + sym.pulse) * 0.15 + 0.85;
    drawSymbol(sym.x, sym.y, sym.type, 12 * pulse, 0.7, t);
  }
}

function drawTraffic(t) {
  for (const tr of traffic) {
    tr.y += tr.speed * 0.016;
    if (tr.y > H + 60) {
      tr.y = -40 - Math.random() * H;
      tr.lane = Math.floor(Math.random() * LANE_COUNT);
      tr.x = LANE_START_X + LANE_SPACING * (tr.lane + 1) + (Math.random() - 0.5) * 15;
      tr.speed = 60 + Math.random() * 100;
    }

    const s = tr.size;
    ctx.save();
    ctx.translate(tr.x, tr.y);

    // Small shuttle body — pointing down (moving down relative to us)
    ctx.fillStyle = `rgba(140,150,165,${tr.alpha})`;
    ctx.beginPath();
    // Nose
    ctx.moveTo(0, -s);
    // Right wing
    ctx.lineTo(s * 0.6, s * 0.3);
    ctx.lineTo(s * 0.3, s * 0.5);
    // Tail
    ctx.lineTo(s * 0.15, s);
    ctx.lineTo(-s * 0.15, s);
    // Left wing
    ctx.lineTo(-s * 0.3, s * 0.5);
    ctx.lineTo(-s * 0.6, s * 0.3);
    ctx.closePath();
    ctx.fill();

    // Engine glow
    ctx.beginPath();
    ctx.arc(0, s + 2, s * 0.25, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(100,180,255,${tr.alpha * 0.5})`;
    ctx.fill();

    // Running lights
    ctx.beginPath();
    ctx.arc(-s * 0.5, s * 0.3, 1, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,60,60,${tr.alpha * 0.6})`;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s * 0.5, s * 0.3, 1, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(60,255,60,${tr.alpha * 0.6})`;
    ctx.fill();

    ctx.restore();
  }
}

function drawPlayerShuttle(t) {
  // Player input
  if (keys['w'] || keys['ArrowUp']) player.y -= 180 * 0.016;
  if (keys['s'] || keys['ArrowDown']) player.y += 180 * 0.016;
  if (keys['a'] || keys['ArrowLeft']) player.targetX -= 120 * 0.016;
  if (keys['d'] || keys['ArrowRight']) player.targetX += 120 * 0.016;

  // Drift toward center
  player.targetX += (player.centerX - player.targetX) * 0.8 * 0.016;

  // Smooth horizontal movement
  player.x += (player.targetX - player.x) * 4 * 0.016;

  // Clamp
  const leftBound = LANE_START_X + LANE_SPACING;
  const rightBound = LANE_START_X + LANE_SPACING * LANE_COUNT;
  player.x = Math.max(leftBound, Math.min(rightBound, player.x));
  player.y = Math.max(40, Math.min(H - 40, player.y));

  // Bob
  player.bob = Math.sin(t * 2) * 2;

  const px = player.x;
  const py = player.y + player.bob;
  const s = 14;

  ctx.save();
  ctx.translate(px, py);

  // Engine glow trail
  const trailGrad = ctx.createLinearGradient(0, s + 2, 0, s + 20);
  trailGrad.addColorStop(0, 'rgba(80,180,255,0.4)');
  trailGrad.addColorStop(0.5, 'rgba(60,140,220,0.15)');
  trailGrad.addColorStop(1, 'rgba(40,100,180,0)');
  ctx.fillStyle = trailGrad;
  ctx.beginPath();
  ctx.moveTo(-4, s + 2);
  ctx.lineTo(4, s + 2);
  ctx.lineTo(2, s + 18);
  ctx.lineTo(-2, s + 18);
  ctx.closePath();
  ctx.fill();

  // Shuttle body — larger, pointing up (we're moving "up" through the scroll)
  ctx.fillStyle = 'rgba(210,215,225,0.9)';
  ctx.beginPath();
  ctx.moveTo(0, -s);
  ctx.lineTo(s * 0.7, s * 0.4);
  ctx.lineTo(s * 0.35, s * 0.6);
  ctx.lineTo(s * 0.2, s);
  ctx.lineTo(-s * 0.2, s);
  ctx.lineTo(-s * 0.35, s * 0.6);
  ctx.lineTo(-s * 0.7, s * 0.4);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.beginPath();
  ctx.ellipse(0, -s * 0.3, 3, 5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(80,180,220,0.5)';
  ctx.fill();

  // Wing accent
  ctx.strokeStyle = 'rgba(60,100,160,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-s * 0.6, s * 0.35);
  ctx.lineTo(s * 0.6, s * 0.35);
  ctx.stroke();

  ctx.restore();
}

function drawManifestCard(t) {
  // HUD card showing current route symbol to collect
  const cardX = 15;
  const cardY = 15;
  const cardW = 90;
  const cardH = 55;

  ctx.save();
  ctx.fillStyle = 'rgba(10,20,35,0.7)';
  ctx.strokeStyle = 'rgba(60,140,180,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(cardX, cardY, cardW, cardH, 4);
  ctx.fill();
  ctx.stroke();

  ctx.font = '8px monospace';
  ctx.fillStyle = 'rgba(80,180,200,0.6)';
  ctx.textAlign = 'center';
  ctx.fillText('NEXT PICKUP', cardX + cardW / 2, cardY + 12);

  // Show a star symbol as current target
  drawSymbol(cardX + cardW / 2, cardY + 34, 'star', 10, 0.8, t);

  ctx.restore();
}

function drawHUD() {
  ctx.save();
  ctx.font = '12px monospace';
  ctx.fillStyle = 'rgba(80,200,190,0.7)';
  ctx.textAlign = 'right';
  ctx.fillText('ROUTE: 0 / 8', W * 0.75 - 15, 28);

  // Health bar
  const barX = W * 0.75 - 130;
  const barY = 35;
  const barW = 115;
  const barH = 6;
  ctx.fillStyle = 'rgba(20,40,60,0.5)';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = 'rgba(60,200,140,0.6)';
  ctx.fillRect(barX, barY, barW * 0.85, barH);
  ctx.strokeStyle = 'rgba(60,140,160,0.3)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(barX, barY, barW, barH);

  ctx.restore();
}

function drawDistantStations(t) {
  for (const st of stations) {
    const sy = ((st.y + scrollOffset * st.speed * 0.001) % (H + 40)) - 20;

    ctx.save();
    ctx.translate(st.x, sy);
    ctx.fillStyle = `rgba(100,120,150,${st.alpha})`;

    // Simple station shape — cross
    ctx.fillRect(-st.size, -1.5, st.size * 2, 3);
    ctx.fillRect(-1.5, -st.size, 3, st.size * 2);

    // Solar panel squares
    ctx.fillRect(-st.size - 3, -3, 4, 6);
    ctx.fillRect(st.size - 1, -3, 4, 6);

    ctx.restore();
  }
}

function drawVignette() {
  const vg = ctx.createRadialGradient(W * 0.4, H * 0.5, W * 0.2, W * 0.45, H * 0.5, W * 0.65);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(0.6, 'rgba(0,0,0,0.08)');
  vg.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

function render() {
  time += 0.016;
  scrollOffset += SCROLL_SPEED * 0.016;

  ctx.clearRect(0, 0, W, H);

  drawBackground();
  drawStars(time);
  drawEarth(time);
  drawDistantStations(time);
  drawLaneMarkers(time);
  drawScrollParticles();
  drawRouteSymbols(time);
  drawTraffic(time);
  drawPlayerShuttle(time);
  drawManifestCard(time);
  drawHUD();
  drawVignette();

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
