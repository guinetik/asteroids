<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; display: flex; align-items: center; justify-content: center; height: 100vh; }
  canvas { border: 1px solid rgba(100,200,220,0.15); border-radius: 4px; }
</style>
</head>
<body>
<canvas id="c" width="800" height="500"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 500;

// Neptune — centered, fully visible
const NX = W * 0.5;
const NY = H * 0.48;
const NR = 110;

// Sun — tiny distant speck, far upper-left
const SUN_X = W * 0.06;
const SUN_Y = H * 0.06;
const SUN_R = 3;

// Ring system — faint, tilted
const RING_INNER = NR + 18;
const RING_OUTER = NR + 65;
const RING_TILT = 0.22;

// Starfield — deep space, dense
const stars = [];
for (let i = 0; i < 280; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.0 + 0.2,
    brightness: Math.random() * 0.5 + 0.2,
    twinkleSpeed: Math.random() * 1.5 + 0.5,
    twinkleOffset: Math.random() * Math.PI * 2,
    hue: Math.random(),
  });
}

// Ring particles
const ringParticles = [];
for (let i = 0; i < 200; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = RING_INNER + Math.random() * (RING_OUTER - RING_INNER);
  const bandDensity = Math.sin(dist * 0.12) * 0.3 + 0.7;
  if (Math.random() > bandDensity) continue;
  ringParticles.push({
    angle,
    dist,
    size: 0.4 + Math.random() * 1.2,
    brightness: 0.08 + Math.random() * 0.12,
    speed: (0.008 + Math.random() * 0.012) / (dist * 0.004),
  });
}

// Highlighted surface locations — glowing spots on the planet
const surfaceTargets = [
  { lat: -0.3, lon: 0.6, r: 8, pulseOffset: 0 },
  { lat: 0.25, lon: -0.4, r: 7, pulseOffset: 1.5 },
  { lat: -0.1, lon: -0.15, r: 9, pulseOffset: 3.0 },
  { lat: 0.45, lon: 0.2, r: 6, pulseOffset: 4.5 },
  { lat: -0.5, lon: 0.0, r: 7, pulseOffset: 2.2 },
];

// Triton — small distant moon
const TRITON_ORBIT_R = 220;
const TRITON_R = 6;
const TRITON_SPEED = 0.15;

// Ambient ice/dust drifting
const ambientDust = [];
for (let i = 0; i < 35; i++) {
  ambientDust.push({
    x: Math.random() * W,
    y: Math.random() * H,
    size: 0.5 + Math.random() * 1.5,
    speed: 1 + Math.random() * 4,
    alpha: 0.03 + Math.random() * 0.06,
    drift: (Math.random() - 0.5) * 2,
  });
}

let time = 0;

function drawBackground() {
  // Deep cold void — darkest of all planets
  const bg = ctx.createRadialGradient(NX, NY, NR * 0.5, NX, NY, W * 0.9);
  bg.addColorStop(0, '#08101a');
  bg.addColorStop(0.2, '#060c14');
  bg.addColorStop(0.5, '#040810');
  bg.addColorStop(1, '#030508');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
}

function drawStars(t) {
  for (const s of stars) {
    // Skip behind planet
    const dx = s.x - NX;
    const dy = s.y - NY;
    if (dx * dx + dy * dy < (NR + 8) * (NR + 8)) continue;

    const twinkle = Math.sin(t * s.twinkleSpeed + s.twinkleOffset) * 0.3 + 0.7;
    const alpha = s.brightness * twinkle;
    if (alpha < 0.02) continue;

    const r = s.hue > 0.85 ? 235 : s.hue > 0.7 ? 210 : 195;
    const g = s.hue > 0.85 ? 215 : 210;
    const b = 230 + (s.hue < 0.3 ? 20 : 0);

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.fill();
  }
}

function drawSun(t) {
  ctx.save();

  // Tiny glow
  const glow = ctx.createRadialGradient(SUN_X, SUN_Y, 0, SUN_X, SUN_Y, 25);
  glow.addColorStop(0, 'rgba(255,250,235,0.35)');
  glow.addColorStop(0.15, 'rgba(255,240,210,0.08)');
  glow.addColorStop(0.5, 'rgba(255,220,180,0.015)');
  glow.addColorStop(1, 'rgba(255,200,150,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(SUN_X, SUN_Y, 25, 0, Math.PI * 2);
  ctx.fill();

  // Disc
  ctx.beginPath();
  ctx.arc(SUN_X, SUN_Y, SUN_R, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,248,230,0.85)';
  ctx.fill();

  // Light direction indicator — faint line from sun toward Neptune
  const angle = Math.atan2(NY - SUN_Y, NX - SUN_X);
  const grad = ctx.createLinearGradient(SUN_X, SUN_Y, SUN_X + Math.cos(angle) * 80, SUN_Y + Math.sin(angle) * 80);
  grad.addColorStop(0, 'rgba(255,240,200,0.06)');
  grad.addColorStop(1, 'rgba(255,220,160,0)');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(SUN_X + Math.cos(angle) * 8, SUN_Y + Math.sin(angle) * 8);
  ctx.lineTo(SUN_X + Math.cos(angle) * 80, SUN_Y + Math.sin(angle) * 80);
  ctx.stroke();

  ctx.restore();
}

function drawRingsBack(t) {
  ctx.save();
  for (const p of ringParticles) {
    const a = p.angle + t * p.speed;
    const px = NX + Math.cos(a) * p.dist;
    const py = NY + Math.sin(a) * p.dist * RING_TILT;

    // Behind planet only
    if (Math.sin(a) > 0.08) continue;

    const dx = px - NX;
    const dy = py - NY;
    if (dx * dx + dy * dy < NR * NR) continue;
    if (px < -10 || px > W + 10 || py < -10 || py > H + 10) continue;

    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(100,120,160,${p.brightness})`;
    ctx.fill();
  }
  ctx.restore();
}

function drawNeptune(t) {
  ctx.save();

  // Planet body
  ctx.beginPath();
  ctx.arc(NX, NY, NR, 0, Math.PI * 2);
  ctx.clip();

  // Deep cobalt blue gradient
  const pg = ctx.createRadialGradient(
    NX - NR * 0.25, NY - NR * 0.2, NR * 0.1,
    NX, NY, NR
  );
  pg.addColorStop(0, '#5080d0');
  pg.addColorStop(0.2, '#4070c0');
  pg.addColorStop(0.4, '#3060b0');
  pg.addColorStop(0.6, '#2550a0');
  pg.addColorStop(0.8, '#1a4090');
  pg.addColorStop(1, '#0e2860');
  ctx.fillStyle = pg;
  ctx.fillRect(NX - NR, NY - NR, NR * 2, NR * 2);

  // Storm bands — Neptune has visible atmospheric features
  for (let i = 0; i < 10; i++) {
    const bandY = NY - NR + (NR * 2 / 10) * i;
    const bandH = NR * 2 / 10;
    const drift = Math.sin(i * 1.8 + t * 0.15 * (1 + i * 0.1)) * 3;
    const alpha = 0.03 + Math.sin(i * 2.5) * 0.015;
    ctx.fillStyle = i % 2 === 0
      ? `rgba(70,120,200,${alpha})`
      : `rgba(30,70,160,${alpha})`;
    ctx.fillRect(NX - NR + drift, bandY, NR * 2, bandH);
  }

  // Great Dark Spot — Neptune's signature storm
  ctx.save();
  const spotX = NX + NR * 0.15 + Math.sin(t * 0.08) * 3;
  const spotY = NY + NR * 0.1;
  const spotGrad = ctx.createRadialGradient(spotX, spotY, 0, spotX, spotY, 18);
  spotGrad.addColorStop(0, 'rgba(10,25,70,0.35)');
  spotGrad.addColorStop(0.6, 'rgba(15,35,80,0.15)');
  spotGrad.addColorStop(1, 'rgba(20,45,90,0)');
  ctx.fillStyle = spotGrad;
  ctx.beginPath();
  ctx.ellipse(spotX, spotY, 20, 12, 0.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Bright companion cloud
  const cloudX = spotX + 22;
  const cloudY = spotY - 8;
  const cloudGrad = ctx.createRadialGradient(cloudX, cloudY, 0, cloudX, cloudY, 8);
  cloudGrad.addColorStop(0, 'rgba(140,180,240,0.2)');
  cloudGrad.addColorStop(1, 'rgba(100,150,220,0)');
  ctx.fillStyle = cloudGrad;
  ctx.beginPath();
  ctx.ellipse(cloudX, cloudY, 10, 5, -0.2, 0, Math.PI * 2);
  ctx.fill();

  // Limb darkening
  const limb = ctx.createRadialGradient(
    NX - NR * 0.2, NY - NR * 0.15, NR * 0.25,
    NX, NY, NR
  );
  limb.addColorStop(0, 'rgba(0,0,0,0)');
  limb.addColorStop(0.55, 'rgba(0,0,0,0.08)');
  limb.addColorStop(0.8, 'rgba(0,0,0,0.25)');
  limb.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = limb;
  ctx.fillRect(NX - NR, NY - NR, NR * 2, NR * 2);

  // Sunlit crescent — faint illumination from upper-left
  const sunAngle = Math.atan2(NY - SUN_Y, NX - SUN_X);
  const crescentGrad = ctx.createLinearGradient(
    NX - Math.cos(sunAngle) * NR,
    NY - Math.sin(sunAngle) * NR,
    NX + Math.cos(sunAngle) * NR,
    NY + Math.sin(sunAngle) * NR,
  );
  crescentGrad.addColorStop(0, 'rgba(120,160,230,0.12)');
  crescentGrad.addColorStop(0.4, 'rgba(0,0,0,0)');
  crescentGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = crescentGrad;
  ctx.fillRect(NX - NR, NY - NR, NR * 2, NR * 2);

  ctx.restore();

  // Atmospheric glow
  const glow = ctx.createRadialGradient(NX, NY, NR - 3, NX, NY, NR + 20);
  glow.addColorStop(0, 'rgba(60,100,200,0)');
  glow.addColorStop(0.5, 'rgba(60,100,200,0.04)');
  glow.addColorStop(0.8, 'rgba(50,80,180,0.02)');
  glow.addColorStop(1, 'rgba(40,60,150,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(NX, NY, NR + 20, 0, Math.PI * 2);
  ctx.fill();
}

function drawSurfaceTargets(t) {
  // Highlighted locations on the planet surface — glowing markers
  ctx.save();
  for (const target of surfaceTargets) {
    // Project lat/lon onto circle
    // lon rotates slowly to simulate planet rotation
    const rotatedLon = target.lon + t * 0.06;
    const x = NX + Math.sin(rotatedLon) * NR * 0.85 * Math.cos(target.lat);
    const y = NY + Math.sin(target.lat) * NR * 0.85;

    // Only visible on the "front" face
    const depth = Math.cos(rotatedLon);
    if (depth < 0.1) continue;
    const faceAlpha = Math.min(1, (depth - 0.1) * 2);

    // Check if inside planet circle
    const dx = x - NX;
    const dy = y - NY;
    if (dx * dx + dy * dy > (NR - 4) * (NR - 4)) continue;

    // Pulsing glow
    const pulse = Math.sin(t * 2.5 + target.pulseOffset) * 0.3 + 0.7;
    const alpha = faceAlpha * pulse;

    // Outer glow
    const outerGlow = ctx.createRadialGradient(x, y, 0, x, y, target.r * 2.5);
    outerGlow.addColorStop(0, `rgba(100,220,255,${alpha * 0.3})`);
    outerGlow.addColorStop(0.4, `rgba(80,180,240,${alpha * 0.1})`);
    outerGlow.addColorStop(1, 'rgba(60,140,220,0)');
    ctx.fillStyle = outerGlow;
    ctx.beginPath();
    ctx.arc(x, y, target.r * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Core dot
    const coreGlow = ctx.createRadialGradient(x, y, 0, x, y, target.r);
    coreGlow.addColorStop(0, `rgba(160,240,255,${alpha * 0.7})`);
    coreGlow.addColorStop(0.5, `rgba(100,200,240,${alpha * 0.4})`);
    coreGlow.addColorStop(1, `rgba(60,160,220,${alpha * 0.1})`);
    ctx.fillStyle = coreGlow;
    ctx.beginPath();
    ctx.arc(x, y, target.r, 0, Math.PI * 2);
    ctx.fill();

    // Ring indicator
    ctx.beginPath();
    ctx.arc(x, y, target.r * 1.6, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(100,200,240,${alpha * 0.25})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }
  ctx.restore();
}

function drawRingsFront(t) {
  ctx.save();
  for (const p of ringParticles) {
    const a = p.angle + t * p.speed;
    const px = NX + Math.cos(a) * p.dist;
    const py = NY + Math.sin(a) * p.dist * RING_TILT;

    if (Math.sin(a) <= 0.08) continue;
    if (px < -10 || px > W + 10 || py < -10 || py > H + 10) continue;

    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(100,120,160,${p.brightness * 0.7})`;
    ctx.fill();
  }
  ctx.restore();
}

function drawTriton(t) {
  // Triton — retrograde orbit moon
  const angle = -t * TRITON_SPEED; // retrograde
  const tx = NX + Math.cos(angle) * TRITON_ORBIT_R;
  const ty = NY + Math.sin(angle) * TRITON_ORBIT_R * 0.3; // tilted orbit

  // Orbit path — very faint
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(NX, NY, TRITON_ORBIT_R, TRITON_ORBIT_R * 0.3, 0, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(80,100,140,0.04)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  ctx.restore();

  // Only draw if not behind planet
  const dx = tx - NX;
  const dy = ty - NY;
  const behindPlanet = dx * dx + dy * dy < NR * NR && Math.sin(angle) < 0;
  if (behindPlanet) return;

  // Moon body
  ctx.save();
  const moonGrad = ctx.createRadialGradient(tx - 1, ty - 1, 0, tx, ty, TRITON_R);
  moonGrad.addColorStop(0, 'rgba(200,195,185,0.8)');
  moonGrad.addColorStop(0.6, 'rgba(160,155,145,0.6)');
  moonGrad.addColorStop(1, 'rgba(100,95,90,0.3)');
  ctx.fillStyle = moonGrad;
  ctx.beginPath();
  ctx.arc(tx, ty, TRITON_R, 0, Math.PI * 2);
  ctx.fill();

  // Label
  ctx.font = '8px monospace';
  ctx.fillStyle = 'rgba(140,160,180,0.3)';
  ctx.textAlign = 'center';
  ctx.fillText('TRITON', tx, ty + TRITON_R + 10);
  ctx.restore();
}

function drawSolarPanelOrbits() {
  // Faint concentric guide rings where solar panels would be placed
  ctx.save();
  const panelOrbitRadii = [NR + 85, NR + 110, NR + 140];
  for (const r of panelOrbitRadii) {
    ctx.beginPath();
    ctx.arc(NX, NY, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(60,100,160,0.06)';
    ctx.lineWidth = 0.5;
    ctx.setLineDash([3, 8]);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
}

function drawAmbientDust(t) {
  ctx.save();
  for (const d of ambientDust) {
    d.x -= d.speed * 0.016;
    d.y += d.drift * 0.016;
    if (d.x < -10) {
      d.x = W + 10;
      d.y = Math.random() * H;
    }

    ctx.beginPath();
    ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(100,130,180,${d.alpha})`;
    ctx.fill();
  }
  ctx.restore();
}

function drawVignette() {
  const vg = ctx.createRadialGradient(NX, NY, NR * 1.5, NX, NY, W * 0.72);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(0.5, 'rgba(0,0,0,0.1)');
  vg.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

function render() {
  time += 0.016;
  ctx.clearRect(0, 0, W, H);

  drawBackground();
  drawStars(time);
  drawSun(time);
  drawSolarPanelOrbits();
  drawRingsBack(time);
  drawTriton(time);
  drawNeptune(time);
  drawSurfaceTargets(time);
  drawRingsFront(time);
  drawAmbientDust(time);
  drawVignette();

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
