                  y: this.landerY + LanderGame.LANDER_HEIGHT / 2,
                  vx: (Math.random() - 0.5) * 60,
                  vy: Math.random() * 80 + 40,
                  life: 0.8,
                });
              }

              this._updateCoins(deltaSec);
            }

            for (let i = this.particles.length - 1; i >= 0; i--) {
              const p = this.particles[i];
              p.x += p.vx * deltaSec;
              p.y += p.vy * deltaSec;
              p.life -= deltaSec * 2;
              if (p.life <= 0) {
                this.particles.splice(i, 1);
              }
            }
          }

          _draw() {
            const ctx = this.ctx;
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, this.width, this.height);

            for (const star of this.stars) {
              ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
              ctx.fillRect(star.x, star.y, 1, 1);
            }

            ctx.fillStyle = '#ffffff';
            ctx.font = '16px monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${this.score.toString().padStart(4, '0')}`, 20, 30);

            if (this.state === 'falling') {
              ctx.textAlign = 'center';
              ctx.font = '20px monospace';
              ctx.fillText('APPROACHING', this.width / 2, 30);
              ctx.font = '12px monospace';
              ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
              ctx.fillText('SPACE / CLICK = THRUST   |   A / D OR SWIPE MOUSE = STEER', this.width / 2, 52);
              ctx.fillStyle = '#ffffff';
            }

            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1.5;
            for (const coin of this.coins) {
              ctx.beginPath();
              ctx.moveTo(coin.x, coin.y - 6);
              ctx.lineTo(coin.x + 6, coin.y);
              ctx.lineTo(coin.x, coin.y + 6);
              ctx.lineTo(coin.x - 6, coin.y);
              ctx.closePath();
              ctx.stroke();
            }

            ctx.fillStyle = '#ffffff';
            for (const p of this.particles) {
              ctx.globalAlpha = p.life;
              ctx.fillRect(p.x, p.y, 2, 2);
            }
            ctx.globalAlpha = 1.0;

            if (this.terrainVisible && (this.state === 'landing' || this.state === 'landed')) {
              const padY = this.state === 'landed' ? this.height * LanderGame.TERRAIN_PAD_FINAL_RATIO : this.terrainPadY;
              ctx.strokeStyle = '#ffffff';
              ctx.lineWidth = 2;
              ctx.beginPath();
              for (let i = 0; i < LanderGame.TERRAIN_POINTS.length; i++) {
                const [xr, yr] = LanderGame.TERRAIN_POINTS[i];
                const px = xr * this.width;
                const py = padY + yr * this.height;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
              }
              ctx.stroke();
            }

            ctx.save();
            ctx.translate(this.landerX, this.landerY);
            if (this.landerRotation !== 0) ctx.rotate(this.landerRotation);

            ctx.scale(0.7, 0.7);
            ctx.translate(-50, -50);

            ctx.translate(50, 57.5);
            ctx.scale(0.835, 0.835);
            ctx.translate(-50, -57.5);

            ctx.fillStyle = '#ffffff';
            ctx.fill(this.landerPath1);

            if (this.state === 'falling' || this.state === 'landing') {
              ctx.globalAlpha = 0.5 + Math.random() * 0.5;
              ctx.fillStyle = '#38bdf8';
              ctx.fill(this.landerPath2);
              ctx.globalAlpha = 1.0;
            }

            ctx.fillStyle = '#ffffff';
            ctx.fill(this.landerPath3);

            ctx.restore();
          }

          ready() {
            this.readyPending = true;
          }

          _onCanvasInit() {
            this.shipX = this.width / 2;
            this.shipY = this.height * ShuttleGame.SHIP_SPAWN_Y_RATIO;
            this.shipVX = 0;
            this.shipVY = 0;

            this.starLayers = [];
            for (let layer = 0; layer < ShuttleGame.STAR_LAYERS; layer++) {
              const stars = [];
              for (let i = 0; i < ShuttleGame.STAR_COUNT_PER_LAYER[layer]; i++) {
                stars.push({
                  x: Math.random() * this.width,
                  y: Math.random() * this.height,
                  size: ShuttleGame.STAR_LAYER_SIZES[layer],
                  brightness: Math.random() * 0.7 + 0.3,
                });
              }
              this.starLayers.push({
                stars,
                speed: ShuttleGame.STAR_LAYER_SPEEDS[layer],
              });
            }
          }

          _updateStarfield(deltaSec) {
            for (const layer of this.starLayers) {
              for (const s of layer.stars) {
                s.y += layer.speed * this.bgScale * deltaSec;
                if (s.y > this.height) {
                  s.y -= this.height + Math.random() * 20;
                  s.x = Math.random() * this.width;
                  s.brightness = Math.random() * 0.7 + 0.3;
                }
              }
            }
          }

          _attachInput() {
            window.addEventListener('keydown', this._boundKeyDown);
            window.addEventListener('keyup', this._boundKeyUp);
          }

          _detachInput() {
            window.removeEventListener('keydown', this._boundKeyDown);
            window.removeEventListener('keyup', this._boundKeyUp);
          }

          _handleKeyDown(e) {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') this.keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') this.keys.right = true;
            if (e.key === ' ' || e.code === 'Space') {
              this.keys.fire = true;
              e.preventDefault();
            }
          }

          _handleKeyUp(e) {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') this.keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') this.keys.right = false;
            if (e.key === ' ' || e.code === 'Space') this.keys.fire = false;
          }

          _updateShuttle(deltaSec) {
            if (this.keys.left) {
              this.shipVX -= ShuttleGame.SHUTTLE_ACCEL * deltaSec;
            } else if (this.keys.right) {
              this.shipVX += ShuttleGame.SHUTTLE_ACCEL * deltaSec;
            } else if (this.shipVX > 0) {
              this.shipVX = Math.max(0, this.shipVX - ShuttleGame.SHUTTLE_DRAG * deltaSec);
            } else if (this.shipVX < 0) {
              this.shipVX = Math.min(0, this.shipVX + ShuttleGame.SHUTTLE_DRAG * deltaSec);
            }

            this.shipVX = Math.max(-ShuttleGame.SHUTTLE_MAX_SPEED, Math.min(ShuttleGame.SHUTTLE_MAX_SPEED, this.shipVX));

            this.shipX += this.shipVX * deltaSec;

            const inset = ShuttleGame.SHIP_EDGE_INSET;
            if (this.shipX < inset) { this.shipX = inset; this.shipVX = 0; }
            if (this.shipX > this.width - inset) { this.shipX = this.width - inset; this.shipVX = 0; }

            if (Math.random() < ShuttleGame.REAR_THRUSTER_SPAWN_CHANCE) {
              this.particles.push({
                x: this.shipX + (Math.random() - 0.5) * 8,
                y: this.shipY + ShuttleGame.PARTICLE_OFFSET + (Math.random() - 0.5) * 4,
                vx: -this.shipVX * 0.2 + (Math.random() - 0.5) * 30,
                vy: ShuttleGame.REAR_THRUSTER_VY + (Math.random() - 0.5) * 40,
                life: ShuttleGame.PARTICLE_LIFE_S,
              });
            }

            const sideThrusting = this.keys.left || this.keys.right;
            if (sideThrusting && Math.random() < ShuttleGame.PARTICLE_SPAWN_CHANCE) {
              let px = 0;
              if (this.keys.left)  { px =  ShuttleGame.PARTICLE_OFFSET; }
              if (this.keys.right) { px = -ShuttleGame.PARTICLE_OFFSET; }
              this.particles.push({
                x: this.shipX + px + (Math.random() - 0.5) * 6,
                y: this.shipY + ShuttleGame.PARTICLE_SIDE_Y_OFFSET + (Math.random() - 0.5) * 6,
                vx: -this.shipVX * 0.3 + (Math.random() - 0.5) * 40,
                vy: (Math.random() - 0.5) * 40,
                life: ShuttleGame.PARTICLE_LIFE_S,
              });
            }

            for (let i = this.particles.length - 1; i >= 0; i--) {
              const p = this.particles[i];
              p.x += p.vx * deltaSec;
              p.y += p.vy * deltaSec;
              p.life -= deltaSec;
              if (p.life <= 0) this.particles.splice(i, 1);
            }
          }

          _makeAsteroidVertices(radius) {
            const count = ShuttleGame.ASTEROID_VERTEX_MIN
              + Math.floor(Math.random() * (ShuttleGame.ASTEROID_VERTEX_MAX - ShuttleGame.ASTEROID_VERTEX_MIN + 1));
            const verts = [];
            for (let i = 0; i < count; i++) {
              const angle = (i / count) * Math.PI * 2;
              const jitter = 1 + (Math.random() * 2 - 1) * ShuttleGame.ASTEROID_VERTEX_JITTER;
              verts.push({ angle, distance: radius * jitter });
            }
            return verts;
          }

          _spawnAsteroid(size) {
            const radius = ShuttleGame.ASTEROID_RADII[size];
            const x = Math.random() * (this.width - radius * 2) + radius;
            const y = -radius - 10;
            const vy = ShuttleGame.ASTEROID_VY_MIN + Math.random() * (ShuttleGame.ASTEROID_VY_MAX - ShuttleGame.ASTEROID_VY_MIN);
            const vx = (Math.random() * 2 - 1) * ShuttleGame.ASTEROID_VX_RANGE;
            this.asteroids.push({
              x, y, vx, vy,
              size,
              radius,
              vertices: this._makeAsteroidVertices(radius),
              rotation: Math.random() * Math.PI * 2,
              rotationVel: (Math.random() * 2 - 1) * ShuttleGame.ASTEROID_ROT_VEL_RANGE,
            });
          }

          _currentSpawnInterval() {
            const t = Math.min(1, this.elapsed / ShuttleGame.ASTEROID_RAMP_MS);
            return ShuttleGame.ASTEROID_BASE_SPAWN_MS
              + (ShuttleGame.ASTEROID_MIN_SPAWN_MS - ShuttleGame.ASTEROID_BASE_SPAWN_MS) * t;
          }

          _pickSpawnSize() {
            const r = Math.random();
            if (r < ShuttleGame.ASTEROID_SPAWN_BIG_PROB) return 'big';
            if (r < ShuttleGame.ASTEROID_SPAWN_BIG_PROB + ShuttleGame.ASTEROID_SPAWN_MED_PROB) return 'med';
            return 'small';
          }

          _updateAsteroids(deltaSec) {
            if (this.state === 'cruising' && this.elapsed - this.lastAsteroidSpawn >= this._currentSpawnInterval()) {
              this._spawnAsteroid(this._pickSpawnSize());
              this.lastAsteroidSpawn = this.elapsed;
            }
            for (let i = this.asteroids.length - 1; i >= 0; i--) {
              const a = this.asteroids[i];
              a.x += a.vx * this.bgScale * deltaSec;
              a.y += a.vy * this.bgScale * deltaSec;
              a.rotation += a.rotationVel * deltaSec;
              if (a.x < -a.radius) a.x = this.width + a.radius;
              if (a.x > this.width + a.radius) a.x = -a.radius;
              if (a.y > this.height + a.radius) this.asteroids.splice(i, 1);
            }
          }

          _drawAsteroids() {
            const ctx = this.ctx;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1.5;
            for (const a of this.asteroids) {
              ctx.save();
              ctx.translate(a.x, a.y);
              ctx.rotate(a.rotation);
              ctx.beginPath();
              for (let i = 0; i < a.vertices.length; i++) {
                const v = a.vertices[i];
                const px = Math.cos(v.angle) * v.distance;
                const py = Math.sin(v.angle) * v.distance;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
              }
              ctx.closePath();
              ctx.stroke();
              ctx.restore();
            }
          }

          _tryFire() {
            if (this.state !== 'cruising' && this.state !== 'finale') return;
            if (!this.keys.fire) return;
            if (this.bullets.length >= ShuttleGame.MAX_BULLETS) return;
            if (this.elapsed - this.lastFireTime < ShuttleGame.BULLET_COOLDOWN_MS) return;
            this.bullets.push({
              x: this.shipX,
              y: this.shipY - ShuttleGame.BULLET_NOSE_OFFSET,
              vy: -ShuttleGame.BULLET_SPEED,
              life: ShuttleGame.BULLET_LIFETIME_S,
            });
            this.lastFireTime = this.elapsed;
          }

          _updateBullets(deltaSec) {
            this._tryFire();
            for (let i = this.bullets.length - 1; i >= 0; i--) {
              const b = this.bullets[i];
              b.y += b.vy * deltaSec;
              b.life -= deltaSec;
              if (b.life <= 0 || b.y < -10) this.bullets.splice(i, 1);
            }
          }

          _splitAsteroid(parent) {
            const childSize = parent.size === 'big' ? 'med' : parent.size === 'med' ? 'small' : null;
            if (childSize === null) return;
            const radius = ShuttleGame.ASTEROID_RADII[childSize];
            for (let i = 0; i < 2; i++) {
              const angle = (i === 0 ? -1 : 1) * (Math.PI / 4) + (Math.random() - 0.5) * 0.4;
              const speed = ShuttleGame.SPLIT_SPEED;
              this.asteroids.push({
                x: parent.x,
                y: parent.y,
                vx: parent.vx + Math.sin(angle) * speed,
                vy: Math.max(ShuttleGame.ASTEROID_VY_MIN, parent.vy + Math.cos(angle) * speed * 0.3),
                size: childSize,
                radius,
                vertices: this._makeAsteroidVertices(radius),
                rotation: Math.random() * Math.PI * 2,
                rotationVel: (Math.random() * 2 - 1) * ShuttleGame.ASTEROID_ROT_VEL_RANGE,
              });
            }
          }

          _updateBulletAsteroidCollisions() {
            for (let bi = this.bullets.length - 1; bi >= 0; bi--) {
              const b = this.bullets[bi];
              let consumed = false;
              for (let ai = this.asteroids.length - 1; ai >= 0; ai--) {
                const a = this.asteroids[ai];
                const dx = a.x - b.x;
                const dy = a.y - b.y;
                if (dx * dx + dy * dy <= a.radius * a.radius) {
                  this.score += ShuttleGame.SCORE[a.size];
                  this._splitAsteroid(a);
                  this.asteroids.splice(ai, 1);
                  consumed = true;
                  break;
                }
              }
              if (!consumed && this.destination) {
                const dx = this.destination.x - b.x;
                const dy = this.destination.y - b.y;
                if (dx * dx + dy * dy <= this.destination.radius * this.destination.radius) {
                  for (let k = 0; k < 4; k++) {
                    this.particles.push({
                      x: b.x, y: b.y,
                      vx: (Math.random() - 0.5) * 120,
                      vy: (Math.random() - 0.5) * 120,
                      life: ShuttleGame.PARTICLE_LIFE_S * 0.5,
                    });
                  }
                  consumed = true;
                }
              }
              if (consumed) this.bullets.splice(bi, 1);
            }
          }

          _tryEnterFinale() {
            if (this.state !== 'cruising') return;
            if (!this.readyPending) return;
            if (performance.now() - this.fallingStartTime < ShuttleGame.MIN_RUN_MS) return;
            this.keys.left = false;
            this.keys.right = false;
            this.keys.fire = false;
            // Return-from-mission flow has no destination asteroid — once
            // the map is ready, just freeze the field and exit upward.
            if (this.mode === 'return') {
              this.state = 'exit';
              this.exitStartTime = this.elapsed;
              this.bgScale = 0;
              return;
            }
            this.state = 'finale';
            this.finaleStartTime = this.elapsed;
            const radius = Math.max(this.width, this.height) * ShuttleGame.DESTINATION_RADIUS_SCALE;
            this.destination = {
              x: this.width / 2,
              y: -radius * 1.5,
              targetY: -radius * ShuttleGame.DESTINATION_TARGET_OFFSET,
              vy: ShuttleGame.DESTINATION_DRIFT_SPEED,
              radius,
              settledAt: 0,
            };
          }

          _updateFinale(deltaSec) {
            if (this.state !== 'finale') return;

            if (this.destination.y < this.destination.targetY) {
              this.destination.y += this.destination.vy * deltaSec;
              if (this.destination.y >= this.destination.targetY) {
                this.destination.y = this.destination.targetY;
                this.destination.settledAt = this.elapsed;
              }
            }

            // Background freeze starts the instant the asteroid is on-screen,
            // not on a fixed timer. Bottom edge of the rock = y + radius.
            const visible = this.destination.y + this.destination.radius > 0;
            if (visible) {
              this.bgScale = Math.max(0, this.bgScale - deltaSec / (ShuttleGame.FINALE_BG_FREEZE_MS / 1000));
              this.shipVY = Math.max(
                -ShuttleGame.EXIT_MAX_SPEED,
                this.shipVY - ShuttleGame.EXIT_ACCEL * deltaSec
              );
              this.shipY += this.shipVY * deltaSec;
            }

            if (
              this.destination.settledAt > 0 &&
              this.elapsed - this.destination.settledAt >= ShuttleGame.DESTINATION_LINGER_MS
            ) {
              this.state = 'exit';
              this.exitStartTime = this.elapsed;
            }
          }

          _updateExit(deltaSec) {
            if (this.state !== 'exit') return;
            this.bgScale = 0;
            this.shipVY = Math.max(
              -ShuttleGame.EXIT_MAX_SPEED,
              this.shipVY - ShuttleGame.EXIT_ACCEL * deltaSec
            );
            this.shipY += this.shipVY * deltaSec;
            if (this.shipY < -ShuttleGame.SHIP_EDGE_INSET * 2) {
              this.stop();
              window.dispatchEvent(new Event('prelude-play'));
            }
          }

          _isInvulnerable() {
            return this.elapsed < this.invulnerableUntil;
          }

          _respawnShuttle() {
            this.shipX = this.width / 2;
            this.shipY = this.height * ShuttleGame.SHIP_SPAWN_Y_RATIO;
            this.shipVX = 0;
            this.shipVY = 0;
            this.score = 0;
            this.invulnerableUntil = this.elapsed + ShuttleGame.RESPAWN_BLINK_MS;

            const r2 = ShuttleGame.RESPAWN_CLEAR_RADIUS * ShuttleGame.RESPAWN_CLEAR_RADIUS;
            for (let i = this.asteroids.length - 1; i >= 0; i--) {
              const a = this.asteroids[i];
              const dx = a.x - this.shipX;
              const dy = a.y - this.shipY;
              if (dx * dx + dy * dy <= r2) this.asteroids.splice(i, 1);
            }
          }

          _updateShuttleAsteroidCollisions() {
            if (this._isInvulnerable()) return;
            for (const a of this.asteroids) {
              const dx = a.x - this.shipX;
              const dy = a.y - this.shipY;
              const hitR = a.radius + ShuttleGame.SHIP_COLLIDER_RADIUS;
              if (dx * dx + dy * dy <= hitR * hitR) {
                this._respawnShuttle();
                return;
              }
            }
          }

          _update(dt) {
            this.elapsed += dt;
            const deltaSec = dt / 1000;
            this._updateStarfield(deltaSec);
            if (this.state !== 'exit') this._updateShuttle(deltaSec);
            this._updateAsteroids(deltaSec);
            this._updateBullets(deltaSec);
            this._updateBulletAsteroidCollisions();
            this._updateShuttleAsteroidCollisions();
            this._tryEnterFinale();
            this._updateFinale(deltaSec);
            this._updateExit(deltaSec);
          }

          _drawDestination() {
            if (!this.destination) return;
            const ctx = this.ctx;
            ctx.save();
            ctx.translate(this.destination.x, this.destination.y);
            ctx.beginPath();
            const verts = 48;
            for (let i = 0; i < verts; i++) {
              const angle = (i / verts) * Math.PI * 2;
              const r = this.destination.radius * (
                0.96
                + 0.025 * Math.sin(angle * 7)
                + 0.015 * Math.sin(angle * 13 + 1.3)
              );
              const px = Math.cos(angle) * r;
              const py = Math.sin(angle) * r;
              if (i === 0) ctx.moveTo(px, py);
              else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fillStyle = '#000';
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();
          }

          _draw() {
            const ctx = this.ctx;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, this.width, this.height);

            for (const layer of this.starLayers) {
              for (const s of layer.stars) {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.brightness})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
              }
            }

            ctx.fillStyle = '#ffffff';
            ctx.font = '16px monospace';
            ctx.textAlign = 'left';
            const headerText = this.mode === 'return'
              ? 'RETURNING FROM MISSION'
              : (this.state === 'finale' || this.state === 'exit')
                ? 'DESTINATION REACHED'
                : 'TRAVELLING TO MISSION DESTINATION';
            ctx.fillText(headerText, 20, 30);
            if (this.state === 'cruising') {
              ctx.font = '12px monospace';
              ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
              ctx.fillText('A / D MOVE   SPACE SHOOT   AVOID THE ROCKS', 20, 50);
              ctx.font = '16px monospace';
              ctx.fillStyle = '#ffffff';
            }
            ctx.textAlign = 'right';
            ctx.fillText(`SCORE ${this.score.toString().padStart(5, '0')}`, this.width - 20, 30);

            ctx.fillStyle = '#ffffff';
            for (const p of this.particles) {
              ctx.globalAlpha = Math.max(0, p.life / ShuttleGame.PARTICLE_LIFE_S);
              ctx.fillRect(p.x, p.y, 2, 2);
            }
            ctx.globalAlpha = 1.0;

            this._drawDestination();
            this._drawAsteroids();

            ctx.fillStyle = '#ffffff';
            for (const b of this.bullets) {
              ctx.fillRect(b.x - 1, b.y - 5, 2, 6);
            }

            const scale = Math.min(this.width, this.height) / ShuttleGame.SHUTTLE_FIT_DIVISOR;
            const sourceCenterX = (ShuttleGame.SOURCE_BBOX_MIN_X + ShuttleGame.SOURCE_BBOX_MAX_X) / 2;
            const sourceCenterY = (ShuttleGame.SOURCE_BBOX_MIN_Y + ShuttleGame.SOURCE_BBOX_MAX_Y) / 2;

            const blinkAlpha = this._isInvulnerable()
              ? (Math.floor(this.elapsed / ShuttleGame.BLINK_PERIOD_MS) % 2 === 0 ? 0.3 : 0.8)
              : 1.0;
            ctx.globalAlpha = blinkAlpha * this.shipAlpha;
            ctx.save();
            ctx.translate(this.shipX, this.shipY);
            ctx.scale(scale, scale);
            ctx.translate(-sourceCenterX, -sourceCenterY);
            ctx.fillStyle = '#ffffff';
            for (const part of this.shuttleParts) {
              const [ox, oy] = part.origin;
              ctx.save();
              ctx.translate(ox, oy);
              ctx.transform(0.669131, 0.743145, -0.743145, 0.669131, 0, 0);
              ctx.translate(-ox, -oy);
              ctx.fill(part.path);
              ctx.restore();
            }
            ctx.restore();
            ctx.globalAlpha = 1.0;
          }
        }

        ShuttleGame.STAR_LAYERS = 3;
        ShuttleGame.STAR_COUNT_PER_LAYER = [60, 40, 25];
        ShuttleGame.STAR_LAYER_SPEEDS = [640, 320, 120];
        ShuttleGame.STAR_LAYER_SIZES = [2, 1, 1];
        ShuttleGame.ASTEROID_RADII = { big: 38, med: 24, small: 14 };
        ShuttleGame.ASTEROID_VERTEX_MIN = 8;
        ShuttleGame.ASTEROID_VERTEX_MAX = 12;
        ShuttleGame.ASTEROID_VERTEX_JITTER = 0.25;
        ShuttleGame.ASTEROID_VY_MIN = 450;
        ShuttleGame.ASTEROID_VY_MAX = 950;
        ShuttleGame.ASTEROID_VX_RANGE = 40;
        ShuttleGame.ASTEROID_ROT_VEL_RANGE = 1.2;
        ShuttleGame.ASTEROID_BASE_SPAWN_MS = 550;
        ShuttleGame.ASTEROID_MIN_SPAWN_MS = 160;
        ShuttleGame.ASTEROID_RAMP_MS = 25000;
        ShuttleGame.ASTEROID_SPAWN_BIG_PROB = 0.35;
        ShuttleGame.ASTEROID_SPAWN_MED_PROB = 0.40;
        ShuttleGame.BULLET_SPEED = 1500;
        ShuttleGame.BULLET_LIFETIME_S = 0.6;
        ShuttleGame.BULLET_COOLDOWN_MS = 180;
        ShuttleGame.MAX_BULLETS = 4;
        ShuttleGame.BULLET_NOSE_OFFSET = 22;
        ShuttleGame.SPLIT_SPEED = 80;
        ShuttleGame.SCORE = { big: 20, med: 50, small: 100 };
        ShuttleGame.SHIP_COLLIDER_RADIUS = 18;
        ShuttleGame.RESPAWN_BLINK_MS = 1500;
        ShuttleGame.RESPAWN_CLEAR_RADIUS = 110;
        ShuttleGame.BLINK_PERIOD_MS = 120;
        ShuttleGame.MIN_RUN_MS = 4500;
        // Destination asteroid is intentionally huge — diameter ~= max(w,h)
        // so it spans the full screen width. Center settles above the top
        // edge so only a thin crescent of the bottom curve peeks in — just
        // enough to read as "we've arrived" without dragging the handoff.
        ShuttleGame.DESTINATION_RADIUS_SCALE = 0.95;
        ShuttleGame.DESTINATION_TARGET_OFFSET = 0.85;
        ShuttleGame.DESTINATION_DRIFT_SPEED = 700;
        ShuttleGame.DESTINATION_LINGER_MS = 250;
        ShuttleGame.FINALE_BG_FREEZE_MS = 500;
        ShuttleGame.EXIT_ACCEL = 2200;
        ShuttleGame.EXIT_MAX_SPEED = 2400;
        // Source-space bbox of the shuttle paths AFTER per-part transform-origin
        // pivots are applied. Pulled from the SVG bounds; close enough for centering.
        ShuttleGame.SOURCE_BBOX_MIN_X = -2;
        ShuttleGame.SOURCE_BBOX_MAX_X = 93;
        ShuttleGame.SOURCE_BBOX_MIN_Y = 17;
        ShuttleGame.SOURCE_BBOX_MAX_Y = 112;
        // Larger = smaller shuttle on screen. ~min(w,h)/this controls fit.
        ShuttleGame.SHUTTLE_FIT_DIVISOR = 1400;
        ShuttleGame.SHIP_SPAWN_Y_RATIO = 0.7;
        ShuttleGame.SHIP_EDGE_INSET = 40;
        ShuttleGame.SHUTTLE_ACCEL = 900;
        ShuttleGame.SHUTTLE_MAX_SPEED = 320;
        ShuttleGame.SHUTTLE_DRAG = 600;
        ShuttleGame.PARTICLE_SPAWN_CHANCE = 0.7;
        ShuttleGame.PARTICLE_OFFSET = 24;
        ShuttleGame.PARTICLE_SIDE_Y_OFFSET = 14;
        ShuttleGame.PARTICLE_LIFE_S = 0.6;
        ShuttleGame.REAR_THRUSTER_SPAWN_CHANCE = 0.9;
        ShuttleGame.REAR_THRUSTER_VY = 220;

        // Route gateway. /level → outbound ShuttleGame (full asteroid finale).
        // /map with a pending mission-return handoff in localStorage →
        // return-flow ShuttleGame (no big asteroid, "RETURNING FROM MISSION"
        // header). Everything else → LanderGame.
        // We check both pathname and hash so it works whether router is in
        // history or hash mode (Vue Router default is history, but hash
        // routes still match). The localStorage peek does NOT consume the
        // key — MapViewController.consumePendingMapReturnWorld() owns that.
        function isLevelRoute() {
          const path = window.location.pathname || '';
          const hash = window.location.hash || '';
          return path.includes('/level') || hash.includes('/level');
        }
        function isReturningFromLevel() {
          try {
            return localStorage.getItem('asteroid-lander-map-return-world-v1') !== null;
          } catch (_e) {
            return false;
          }
        }

        const elements = {
          container: document.getElementById('prelude-container'),
          wrapper: document.getElementById('prelude-canvas-wrapper'),
          canvas: document.getElementById('prelude-canvas'),
          playBtn: document.getElementById('prelude-play-btn'),
        };

        let game;
        if (isLevelRoute()) {
          game = new ShuttleGame(elements, 'outbound');
        } else if (isReturningFromLevel()) {
          game = new ShuttleGame(elements, 'return');
        } else {
          game = new LanderGame(elements);
        }
        game.start();

        elements.playBtn.addEventListener('click', () => {
          game.stop();
          window.dispatchEvent(new Event('prelude-play'));
        });

        // Public API consumed by Vue. Surface stays the same regardless of which
        // game is running underneath.
        window.Prelude = {
          ready: () => game.ready(),
          play: () => game.stop(),
        };
      })();
    </script>
    <div id="app"></div>
    <script async src="https://jam.pieter.com/2026/widget.js"></script>
  </body>
</html>
