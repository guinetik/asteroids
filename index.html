<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico" sizes="any" type="image/x-icon">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wdth,wght@50..150,100..900&display=swap" rel="stylesheet" />
    <title>Asteroid Lander</title>
    <style>
      #prelude-container {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        touch-action: none;
      }
      #prelude-canvas-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        max-width: calc(100vh * (9 / 16));
        background-color: #000;
      }
      #prelude-canvas-wrapper::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(255, 255, 255, 0.03) 3px,
          rgba(255, 255, 255, 0.03) 4px
        );
      }
      #prelude-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #prelude-ui {
        position: absolute;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        pointer-events: none;
      }
      #prelude-play-btn {
        pointer-events: auto;
        display: none;
        min-width: 9.5rem;
        padding: 0.72rem 1.15rem;
        border: 1px solid rgba(103, 232, 249, 0.28);
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(34, 211, 238, 0.16), rgba(8, 47, 73, 0.7));
        color: rgba(236, 254, 255, 0.94);
        font-family: 'Datatype', ui-sans-serif, system-ui, sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        cursor: pointer;
        transition: border-color 140ms ease, opacity 140ms ease;
      }
      #prelude-play-btn:hover {
        border-color: rgba(165, 243, 252, 0.72);
        box-shadow: 0 0 1.5rem rgba(34, 211, 238, 0.18);
      }
    </style>
  </head>
  <body>
    <div id="prelude-container">
      <div id="prelude-canvas-wrapper">
        <canvas id="prelude-canvas"></canvas>
      </div>
      <div id="prelude-ui">
        <button id="prelude-play-btn">PLAY</button>
      </div>
    </div>
    
    <script>
      (function() {
        const container = document.getElementById('prelude-container');
        const wrapper = document.getElementById('prelude-canvas-wrapper');
        const canvas = document.getElementById('prelude-canvas');
        const playBtn = document.getElementById('prelude-play-btn');
        const ctx = canvas.getContext('2d');

        let state = 'falling'; // falling, landing, landed
        let landerX = 0;
        let landerY = 0;
        let landerVelocityX = 0;
        let landerVelocityY = 0;
        let score = 0;
        let coins = [];
        let stars = [];
        let particles = [];

        let landingTime = 0;
        let terrainPadY = 0; // current Y of the landing pad (height * 0.8 once terrain has fully risen)
        const TERRAIN_PAD_FINAL_RATIO = 0.8; // resting Y of the pad relative to canvas height
        const TERRAIN_RISE_MS = 2500;        // how long the terrain takes to scroll up into view
        const LANDING_GRAVITY_SCALE = 0.55;  // gentler descent during the landing beat

        let animationFrameId = 0;
        let lastTime = 0;
        let width = 0;
        let height = 0;

        const keys = { left: false, right: false, thrust: false };
        let isPointerDown = false;
        let lastMouseX = null;
        // How much each pixel of mouse movement adds to lateral velocity (px/s per px moved).
        // Picked so a quick flick saturates the lander, while small movements give fine nudges.
        const MOUSE_STEER_GAIN = 3.0;

        const LANDER_WIDTH = 24;
        const LANDER_HEIGHT = 32;
        const COIN_SPAWN_RATE = 700;
        let lastCoinSpawn = 0;

        // Vertical physics
        const GRAVITY = 320;        // px/s^2 down
        const THRUST = 700;         // px/s^2 up while active
        const MAX_FALL_SPEED = 380;
        const MAX_RISE_SPEED = 260;

        // Minimum time the player must spend falling, even if .ready() is called instantly.
        const MIN_FALLING_MS = 4500;
        let fallingStartTime = 0;
        let readyPending = false;

        const landerPath1 = new Path2D("m79.863 77.492h-1.1328l-6.1094-12.168v-7.7266c0-0.58594-0.23438-1.1484-0.64844-1.5625-0.41406-0.41406-0.97656-0.64453-1.5625-0.64453h-40.82c-0.58594 0-1.1484 0.23047-1.5625 0.64453-0.41406 0.41406-0.64844 0.97656-0.64844 1.5625v7.7266l-6.1094 12.168h-1.1328c-0.84766-0.015626-1.5586 0.625-1.6328 1.4648-0.023437 0.42578 0.12891 0.83984 0.42188 1.1484 0.28906 0.30859 0.69531 0.48047 1.1211 0.48047h5.7344c0.84375 0.019531 1.5586-0.62109 1.6328-1.4609 0.023438-0.42578-0.12891-0.83984-0.42187-1.1484-0.29297-0.30859-0.69922-0.48437-1.125-0.48437h-1.0469l5.7812-8.5859-0.003906 0.003906c0.26953 1.5938 1.6484 2.7617 3.2656 2.7617h11.293l-0.30859-2.6875c-0.17188-1.4727 0.29688-2.9453 1.2812-4.0469 0.98438-1.1055 2.3945-1.7383 3.8711-1.7383 1.4805 0 2.8906 0.63281 3.875 1.7383 0.98438 1.1016 1.4531 2.5742 1.2812 4.0469l-0.30859 2.6875h11.293-0.003906c1.6172 0 2.9961-1.168 3.2656-2.7617l5.7773 8.582h-0.96094c-0.84375-0.015626-1.5586 0.625-1.6328 1.4648-0.023438 0.42578 0.12891 0.83984 0.42187 1.1484 0.29297 0.30859 0.69922 0.48047 1.125 0.48047h5.8203c0.42578 0 0.83203-0.17188 1.1211-0.48047 0.29297-0.30859 0.44531-0.72266 0.42188-1.1484-0.074219-0.83984-0.78516-1.4805-1.6328-1.4648z");
        const landerPath2 = new Path2D("m52.91 77.492h-1.1836l1.0156-8.7891h-0.003907c0.09375-0.78125-0.15625-1.5625-0.67969-2.1484-0.52344-0.58984-1.2734-0.92578-2.0586-0.92578s-1.5352 0.33594-2.0586 0.92578c-0.52344 0.58594-0.77344 1.3672-0.67969 2.1484l1.0156 8.7891h-1.1875c-0.41016 0-0.80469 0.16406-1.0977 0.45312-0.28906 0.28906-0.45313 0.68359-0.45313 1.0938 0 0.41016 0.16406 0.80469 0.45313 1.0977 0.29297 0.28906 0.6875 0.45312 1.0977 0.44922h5.8203c0.41016 0.003906 0.80469-0.16016 1.0977-0.44922 0.28906-0.29297 0.45313-0.6875 0.45313-1.0977 0-0.41016-0.16406-0.80469-0.45313-1.0938-0.29297-0.28906-0.6875-0.45312-1.0977-0.45312z");
        const landerPath3 = new Path2D("m35.879 52.586h28.246-0.003906c0.53125 0 1.0352-0.23828 1.3711-0.64844 0.33594-0.41016 0.46875-0.94922 0.36328-1.4688l-0.51172-2.5352h0.003906c-0.13672-0.67188 0.12891-1.3594 0.67578-1.7695l0.86328-0.64062h0.003906c0.54688-0.41016 0.8125-1.0977 0.67578-1.7695l-1.1602-5.7422c-0.13281-0.67188-0.64453-1.207-1.3125-1.3711l-1.0352-0.25391v0.003906c-0.66406-0.16406-1.1797-0.69922-1.3125-1.3711l-0.44922-2.2344c-0.16406-0.82422-0.89062-1.4219-1.7344-1.4219h-9.5312v-6.5c0.98047-0.41406 1.6445-1.3438 1.7227-2.4023 0.039063-0.77734-0.23438-1.5352-0.75781-2.1055-0.52344-0.57422-1.2539-0.91406-2.0273-0.94141-1.3594-0.019531-2.5391 0.92578-2.8203 2.25-0.27734 1.3281 0.42187 2.668 1.6719 3.1992v6.5h-9.3828c-0.84375 0-1.5703 0.59766-1.7344 1.4219l-3.5586 17.684c-0.10547 0.51953 0.027344 1.0586 0.36328 1.4688 0.33594 0.41016 0.83984 0.64844 1.3711 0.64844zm14.121-15.031c2.0859 0 3.9688 1.2578 4.7656 3.1836 0.79688 1.9297 0.35547 4.1484-1.1172 5.6211-1.4766 1.4766-3.6953 1.918-5.6211 1.1211-1.9297-0.80078-3.1836-2.6797-3.1836-4.7656 0-2.8477 2.3086-5.1602 5.1562-5.1602z");

        function initCanvas() {
          const dpr = window.devicePixelRatio || 1;
          const rect = wrapper.getBoundingClientRect();
          width = rect.width;
          height = rect.height;

          canvas.width = width * dpr;
          canvas.height = height * dpr;
          ctx.scale(dpr, dpr);

          resetRun();
          fallingStartTime = performance.now();

          stars = [];
          for (let i = 0; i < 50; i++) {
            stars.push({
              x: Math.random() * width,
              y: Math.random() * height,
              brightness: Math.random() * 0.8 + 0.2,
            });
          }
        }

        function handleResize() {
          initCanvas();
        }

        function resetRun() {
          landerX = width / 2;
          landerY = LANDER_HEIGHT;
          landerVelocityX = 0;
          landerVelocityY = 0;
          score = 0;
          coins = [];
          lastCoinSpawn = 0;
        }

        function handleKeyDown(e) {
          if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
          if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
          if (e.key === ' ' || e.code === 'Space') {
            keys.thrust = true;
            e.preventDefault();
          }
        }

        function handleKeyUp(e) {
          if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
          if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
          if (e.key === ' ' || e.code === 'Space') keys.thrust = false;
        }

        function handlePointerDown() {
          isPointerDown = true;
        }

        function handlePointerUp() {
          isPointerDown = false;
        }

        function handleMouseMove(e) {
          if (state !== 'falling' && state !== 'landing') return;
          if (lastMouseX !== null) {
            // Nudge lateral velocity by the cursor delta. Drag and the velocity
            // clamp in update() will tame it; this gives an analog feel where
            // fast swipes accelerate hard and slow drifts barely move you.
            landerVelocityX += (e.clientX - lastMouseX) * MOUSE_STEER_GAIN;
          }
          lastMouseX = e.clientX;
        }

        function handleMouseLeaveCanvas() {
          lastMouseX = null;
          isPointerDown = false;
        }

        function update(dt) {
          const deltaSec = dt / 1000;

          if (state === 'falling') {
            // Lateral: A/D keys OR mouse half (left half = A, right half = D).
            const lateralAccel = 600;
            const lateralMax = 240;
            const lateralDrag = 320;
            if (keys.left) {
              landerVelocityX -= lateralAccel * deltaSec;
            } else if (keys.right) {
              landerVelocityX += lateralAccel * deltaSec;
            } else {
              if (landerVelocityX > 0) landerVelocityX = Math.max(0, landerVelocityX - lateralDrag * deltaSec);
              if (landerVelocityX < 0) landerVelocityX = Math.min(0, landerVelocityX + lateralDrag * deltaSec);
            }

            landerVelocityX = Math.max(-lateralMax, Math.min(lateralMax, landerVelocityX));
            landerX += landerVelocityX * deltaSec;

            if (landerX < LANDER_WIDTH / 2) {
              landerX = LANDER_WIDTH / 2;
              landerVelocityX = 0;
            }
            if (landerX > width - LANDER_WIDTH / 2) {
              landerX = width - LANDER_WIDTH / 2;
              landerVelocityX = 0;
            }

            // Vertical: gravity always pulls; SPACE / click / touch fires upward thrust.
            const thrusting = keys.thrust || isPointerDown;
            landerVelocityY += GRAVITY * deltaSec;
            if (thrusting) landerVelocityY -= THRUST * deltaSec;
            landerVelocityY = Math.max(-MAX_RISE_SPEED, Math.min(MAX_FALL_SPEED, landerVelocityY));
            landerY += landerVelocityY * deltaSec;

            if (landerY < LANDER_HEIGHT / 2) {
              landerY = LANDER_HEIGHT / 2;
              landerVelocityY = 0;
            }

            // Missed the landing: fell past the bottom before host signalled ready.
            if (landerY > height + LANDER_HEIGHT) {
              resetRun();
            }

            // Thruster exhaust
            if (thrusting && Math.random() < 0.6) {
              particles.push({
                x: landerX + (Math.random() - 0.5) * 8,
                y: landerY + LANDER_HEIGHT / 2,
                vx: (Math.random() - 0.5) * 60,
                vy: Math.random() * 80 + 40,
                life: 0.8,
              });
            }

            // Hand off to landing only once:
            //  - the host has signalled ready,
            //  - the player has had time to feel gravity, and
            //  - the lander is in a sane mid-air position (not freshly respawned at the top).
            if (
              readyPending &&
              performance.now() - fallingStartTime >= MIN_FALLING_MS &&
              landerY > height * 0.25
            ) {
              state = 'landing';
              landingTime = 0;
              // Seed the pad off-screen below so the first draw of the new state
              // doesn't read the stale terrainPadY (would flash at the top of the canvas).
              terrainPadY = height + 80;
            }

            if (lastTime - lastCoinSpawn > COIN_SPAWN_RATE) {
              coins.push({
                x: Math.random() * (width - 40) + 20,
                y: height + 20,
                collected: false,
              });
              lastCoinSpawn = lastTime;
            }

            for (let i = coins.length - 1; i >= 0; i--) {
              const coin = coins[i];
              coin.y -= 150 * deltaSec;
              
              if (!coin.collected) {
                const dx = coin.x - landerX;
                const dy = coin.y - landerY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 24) {
                  coin.collected = true;
                  score += 10;
                }
              }

              if (coin.y < -20 || coin.collected) {
                coins.splice(i, 1);
              }
            }
          } else if (state === 'landing') {
            landingTime += dt;

            // Terrain scrolls up from below. Pad rests at height * TERRAIN_PAD_FINAL_RATIO.
            const t = Math.min(1, landingTime / TERRAIN_RISE_MS);
            const easeT = 1 - Math.pow(1 - t, 3);
            const padStart = height + 80;
            const padEnd = height * TERRAIN_PAD_FINAL_RATIO;
            terrainPadY = padStart + (padEnd - padStart) * easeT;

            // Lander still feels gravity (gentler) and still responds to thrust + lateral input.
            const thrusting = keys.thrust || isPointerDown;
            landerVelocityY += GRAVITY * LANDING_GRAVITY_SCALE * deltaSec;
            if (thrusting) landerVelocityY -= THRUST * deltaSec;
            landerVelocityY = Math.max(-MAX_RISE_SPEED, Math.min(MAX_FALL_SPEED, landerVelocityY));
            landerY += landerVelocityY * deltaSec;
            if (landerY < LANDER_HEIGHT / 2) {
              landerY = LANDER_HEIGHT / 2;
              landerVelocityY = 0;
            }

            // Lateral steering (same as falling).
            const lateralAccel = 600;
            const lateralMax = 240;
            const lateralDrag = 320;
            if (keys.left) {
              landerVelocityX -= lateralAccel * deltaSec;
            } else if (keys.right) {
              landerVelocityX += lateralAccel * deltaSec;
            } else {
              if (landerVelocityX > 0) landerVelocityX = Math.max(0, landerVelocityX - lateralDrag * deltaSec);
              if (landerVelocityX < 0) landerVelocityX = Math.min(0, landerVelocityX + lateralDrag * deltaSec);
            }
            landerVelocityX = Math.max(-lateralMax, Math.min(lateralMax, landerVelocityX));
            landerX += landerVelocityX * deltaSec;
            if (landerX < LANDER_WIDTH / 2) { landerX = LANDER_WIDTH / 2; landerVelocityX = 0; }
            if (landerX > width - LANDER_WIDTH / 2) { landerX = width - LANDER_WIDTH / 2; landerVelocityX = 0; }

            // Touchdown: only count once the pad has finished rising and the lander reaches it.
            const landerFootY = landerY + LANDER_HEIGHT / 2;
            if (t >= 1 && landerFootY >= terrainPadY) {
              landerY = terrainPadY - LANDER_HEIGHT / 2;
              landerVelocityY = 0;
              landerVelocityX = 0;
              state = 'landed';
              playBtn.style.display = 'block';
            }

            // Thruster exhaust
            if (thrusting && Math.random() < 0.6) {
              particles.push({
                x: landerX + (Math.random() - 0.5) * 8,
                y: landerY + LANDER_HEIGHT / 2,
                vx: (Math.random() - 0.5) * 60,
                vy: Math.random() * 80 + 40,
                life: 0.8,
              });
            }

            coins = [];
          }

          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx * deltaSec;
            p.y += p.vy * deltaSec;
            p.life -= deltaSec * 2;
            if (p.life <= 0) {
              particles.splice(i, 1);
            }
          }
        }

        function draw() {
          ctx.fillStyle = '#000000';
          ctx.fillRect(0, 0, width, height);

          for (const star of stars) {
            ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
            ctx.fillRect(star.x, star.y, 1, 1);
          }

          ctx.fillStyle = '#ffffff';
          ctx.font = '16px monospace';
          ctx.textAlign = 'left';
          ctx.fillText(`SCORE: ${score.toString().padStart(4, '0')}`, 20, 30);

          if (state === 'falling') {
            ctx.textAlign = 'center';
            ctx.font = '20px monospace';
            ctx.fillText('APPROACHING', width / 2, 30);
            ctx.font = '12px monospace';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.fillText('SPACE / CLICK = THRUST   |   A / D OR SWIPE MOUSE = STEER', width / 2, 52);
            ctx.fillStyle = '#ffffff';
          }

          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 1.5;
          for (const coin of coins) {
            ctx.beginPath();
            ctx.moveTo(coin.x, coin.y - 6);
            ctx.lineTo(coin.x + 6, coin.y);
            ctx.lineTo(coin.x, coin.y + 6);
            ctx.lineTo(coin.x - 6, coin.y);
            ctx.closePath();
            ctx.stroke();
          }

          ctx.fillStyle = '#ffffff';
          for (const p of particles) {
            ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, 2, 2);
          }
          ctx.globalAlpha = 1.0;

          if (state === 'landing' || state === 'landed') {
            // Pad currently sits at terrainPadY; the rest of the ridge offsets relative to it.
            const padY = state === 'landed' ? height * TERRAIN_PAD_FINAL_RATIO : terrainPadY;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, padY + height * 0.05);
            ctx.lineTo(width * 0.2, padY + height * 0.02);
            ctx.lineTo(width * 0.3, padY + height * 0.05);
            ctx.lineTo(width * 0.4, padY);
            ctx.lineTo(width * 0.6, padY);
            ctx.lineTo(width * 0.7, padY + height * 0.04);
            ctx.lineTo(width * 0.9, padY + height * 0.01);
            ctx.lineTo(width, padY + height * 0.06);
            ctx.stroke();
          }

          ctx.save();
          ctx.translate(landerX, landerY);
          
          ctx.scale(0.7, 0.7);
          ctx.translate(-50, -50);

          ctx.translate(50, 57.5);
          ctx.scale(0.835, 0.835);
          ctx.translate(-50, -57.5);

          ctx.fillStyle = '#ffffff';
          ctx.fill(landerPath1);
          
          if (state === 'falling' || state === 'landing') {
            ctx.globalAlpha = 0.5 + Math.random() * 0.5;
            ctx.fillStyle = '#38bdf8';
            ctx.fill(landerPath2);
            ctx.globalAlpha = 1.0;
          }

          ctx.fillStyle = '#ffffff';
          ctx.fill(landerPath3);

          ctx.restore();
        }

        function loop(time) {
          if (!lastTime) lastTime = time;
          const dt = time - lastTime;
          lastTime = time;

          update(dt);
          draw();

          animationFrameId = requestAnimationFrame(loop);
        }

        initCanvas();
        window.addEventListener('resize', handleResize);
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        
        container.addEventListener('mousedown', handlePointerDown);
        container.addEventListener('mouseup', handlePointerUp);
        container.addEventListener('mousemove', handleMouseMove);
        container.addEventListener('mouseleave', handleMouseLeaveCanvas);
        container.addEventListener('touchstart', function (e) { e.preventDefault(); handlePointerDown(); }, { passive: false });
        container.addEventListener('touchend', handlePointerUp);
        container.addEventListener('touchcancel', handlePointerUp);

        animationFrameId = requestAnimationFrame(loop);

        // Global API for Vue to call
        window.Prelude = {
          ready: function() {
            // Defer the actual transition until MIN_FALLING_MS has elapsed,
            // so the player always gets a real falling beat.
            readyPending = true;
          },
          play: function() {
            container.style.display = 'none';
            cancelAnimationFrame(animationFrameId);
            window.removeEventListener('resize', handleResize);
            window.removeEventListener('keydown', handleKeyDown);
            window.removeEventListener('keyup', handleKeyUp);
          }
        };

        playBtn.addEventListener('click', () => {
          window.Prelude.play();
          // Dispatch a custom event so Vue can listen to it if needed
          window.dispatchEvent(new Event('prelude-play'));
        });
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script async src="https://jam.pieter.com/2026/widget.js"></script>
  </body>
</html>
